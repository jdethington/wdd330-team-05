<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Outside | Product Listing</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script type="module" src="../js/product_listing.js"></script>
</head>

<body>
  <header class="divider" id="main-header"></header>
  <main class="divider">
    <div class="hero">
        <img
          src="/images/banner-sm.jpg"
          srcset="/images/banner-sm.jpg 500w, /images/banner.jpg"
          alt="image of a high mountain lake"
        />
        <div class="logo logo--square">
          <img src="/images/noun_Tent_2517.svg" alt="tent image for logo" />
          <div>Sleep<span class="highlight">Outside</span></div>
        </div>
        <div class="mission">
          <p>
            Our mission is to provide you with everything you need to sleep
            outside comfortably at an affordable price.
          </p>
        </div>
      </div>

    <section id="product-list" class="products">
      <h2>Top Products: <span class="title highlight"></span></h2>
      <div class="sort-by">
      <h3>Sort by</h3>
      <select id="sort-select">
        <option value="name">Name (A-Z)</option>
        <option value="price">Price (Low to High)</option>
      </select>
      </div>
      <ul class="product-list"></ul>
      <div class="display-products">
        <img src="/images/category-tents.svg" alt="Category tents" width="110">
        <img src="/images/category-backpacks.svg" alt="Backpack" width="110">
        <img src="/images/category-sleepingbags.svg" alt="Sleeping bag" width="110">
        <img src="/images/category-hammocks.svg" alt="Hammocks" width="100">
      </div>
    </section>


  </main>
  <footer id="main-footer"></footer>
</body>

</html>
