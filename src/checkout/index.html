  <main class="divider checkout">
    <h2>Review & Place your Order</h2>
    <section class="checkout-form">
      <form name="checkout">
        <input type="hidden" name="orderDate" id="orderDate">

        <fieldset>
          <legend>Name and Address</legend>
          <div class="checkout__name">
            <label for="fname">First Name</label>
            <input type="text" name="fname" id="fname" required>
            <label for="lname">Last Name</label>
            <input type="text" name="lname" id="lname" required>
          </div>
          <div class="checkout__address">
            <label for="street">Street Address</label>
            <input type="text" name="street" id="street" required>
            <label for="city">City</label>
            <input type="text" name="city" id="city" required>
            <label for="state">State</label>
            <input type="text" name="state" id="state" required>
            <label for="zip">Zip</label>
            <input type="text" name="zip" id="zip" required>
          </div>
        </fieldset>

        <fieldset>
          <legend>Payment</legend>
          <div class="checkout__payment">
            <label for="cardNumber">Card Number</label>
            <input type="text" name="cardNumber" id="cardNumber" required value="1234123412341234">
            <label for="expiration">Expiration</label>
            <input type="text" name="expiration" id="expiration" required value="01/2030">
            <label for="code">CVV</label>
            <input type="text" name="code" id="code" required value="123">
          </div>
        </fieldset>

        <fieldset class="checkout-summary">
          <legend>Order Summary</legend>

          <div class="order__summary">
            <div>Items</div>
            <div id="num-items"></div>
            <div>Subtotal</div>
            <div id="cartTotal"></div>
            <div>Tax</div>
            <div id="tax">-</div>
            <div>Shipping</div>
            <div id="shipping">-</div>
            <div>Total</div>
            <div id="orderTotal">-</div>
          </div>
          <button type="submit" id="checkoutSubmit">Checkout</button>
        </fieldset>
      </form>
    </section>
  </main>
  <footer id="main-footer"></footer>
</body>
